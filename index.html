<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Çalık TV</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at right, #330000, #000000 70%);
  font-family: Arial;
  overflow: hidden;
}

/* FADE */
.fade-out {
  animation: fadeOut 0.6s ease forwards;
}

@keyframes fadeOut {
  from { opacity: 1; }
  to { opacity: 0; }
}

/* PARTICLES */
#particles {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

.container {
  text-align: center;
  position: relative;
  z-index: 2;
}

/* NEON YAZI */
h1 {
  font-size: 60px;
  color: #ff1a1a;
  animation: neonFlicker 1.5s infinite alternate, shake 2s infinite;
}

@keyframes neonFlicker {
  0% {
    text-shadow: 0 0 5px #ff1a1a, 0 0 10px #ff1a1a, 0 0 20px #ff4d4d;
  }
  100% {
    text-shadow: 0 0 10px #ff1a1a, 0 0 20px #ff4d4d, 0 0 40px #ff0000;
  }
}

@keyframes shake {
  0% { transform: translate(0, 0); }
  50% { transform: translate(1px, -1px); }
  100% { transform: translate(0, 0); }
}

/* BUTTON */
button {
  margin-top: 30px;
  background: #ff1a1a;
  color: white;
  border: none;
  padding: 15px 35px;
  border-radius: 30px;
  cursor: pointer;
  font-size: 16px;
  transition: transform 0.3s ease;
}

button:hover {
  transform: scale(1.1);
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">
  <h1>Çalık TV</h1>
  <button id="btn">Giriş Yap</button>
</div>

<script>
// BUTON FADE GEÇİŞ
const btn = document.getElementById("btn");

btn.addEventListener("click", () => {
  document.body.classList.add("fade-out");

  setTimeout(() => {
    window.location.href = "tanitim.html";
  }, 600);
});

// PARTICLES
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();

let particles = [];

for (let i = 0; i < 80; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2,
    speedX: (Math.random() - 0.5),
    speedY: (Math.random() - 0.5)
  });
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.x += p.speedX;
    p.y += p.speedY;

    if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
    if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = "#ff1a1a";
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();
window.addEventListener("resize", resizeCanvas);
</script>

</body>
</html>
